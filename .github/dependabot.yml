version: 2
# The constitution mandates exact-pinned dependencies and a CVE-scan policy. Dependabot
# fits that: it proposes PRs that bump the exact pin (never introduces a range), and
# surfaces security advisories for the pinned versions.
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies, ci]
    commit-message:
      prefix: "chore(ci)"
