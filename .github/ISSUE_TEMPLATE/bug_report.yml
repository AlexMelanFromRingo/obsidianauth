name: Bug report
description: Report a defect in ObsidianAuth (NOT a security vulnerability — see SECURITY.md)
labels: [bug]
body:
  - type: markdown
    attributes:
      value: >
        **Stop** — if this is a security vulnerability (auth bypass, secret disclosure,
        pre-auth lockdown escape, audit-chain forgery), do **not** file it here. Report it
        privately per [SECURITY.md](../blob/main/SECURITY.md).

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Plugin version or git commit SHA.
      placeholder: 1.0.0  (or commit 0044fee)
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Affected module
      options:
        - paper-plugin
        - velocity-plugin
        - core
        - build / tooling
        - not sure
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Server platform
      description: Paper/Folia + Velocity versions, Java version, OS, storage backend (SQLite/MySQL).
      placeholder: Paper 1.20.1 build 196, Java 17, Linux, SQLite
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: >
        Server log excerpts. **Redact secrets** — never paste master keys, HMAC secrets,
        TOTP codes, or DB passwords (the plugin itself never logs these).
      render: text
    validations:
      required: false
